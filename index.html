<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Niceleme Basamakları Demo</title>
  <style>
    :root {
      color-scheme: dark;
      --page-bg: #111111;
      --card-bg: #1b1b1b;
      --panel-bg: #242423;
      --border: rgba(255, 255, 255, .09);
      --grid: rgba(255, 255, 255, .16);
      --text: #f3f0ea;
      --muted: #b8b4ad;
      --green: #1D9E75;
      --purple: #7F77DD;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--page-bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    .demo-card {
      width: min(100%, 900px);
      padding: clamp(18px, 4vw, 30px);
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, .38);
    }

    .lvlrow {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 0 1.25rem;
    }

    .bit-label {
      min-width: 34px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    #bits {
      flex: 1;
      accent-color: var(--purple);
    }

    #bitsOut {
      min-width: 16px;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      text-align: right;
    }

    .metrics {
      display: flex;
      gap: 14px;
      margin: 0 0 1.25rem;
    }

    .metric {
      flex: 1;
      min-width: 0;
      padding: .9rem 1rem;
      background: var(--panel-bg);
      border-radius: 8px;
    }

    .metric .lab {
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .metric .val {
      margin: 0;
      color: var(--text);
      font-size: 26px;
      font-weight: 700;
      line-height: 1.1;
    }

    .chart {
      position: relative;
      height: clamp(220px, 34vw, 300px);
      margin: 0 0 .6rem;
    }

    #cv {
      width: 100%;
      height: 100%;
      display: block;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 18px;
      margin: .75rem 0 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .swatch {
      display: inline-block;
      width: 16px;
      height: 3px;
      margin-right: 7px;
      border-radius: 2px;
      vertical-align: middle;
    }

    @media (max-width: 620px) {
      body {
        padding: 14px;
      }

      .metrics {
        flex-direction: column;
      }

      .demo-card {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="demo-card">
    <h2 class="sr-only">Bit derinliği arttıkça niceleme basamaklarının gerçek eğriye yaklaşmasını gösteren interaktif demo</h2>

    <div class="lvlrow">
      <label for="bits" class="bit-label">Bit</label>
      <input type="range" id="bits" min="1" max="6" step="1" value="2">
      <span id="bitsOut">2</span>
    </div>

    <div class="metrics">
      <div class="metric"><p class="lab">Hazır kutu (seviye) sayısı</p><p class="val" id="levels">4</p></div>
      <div class="metric"><p class="lab">Ortalama yuvarlama hatası</p><p class="val" id="err">-</p></div>
    </div>

    <div class="chart">
      <canvas id="cv"></canvas>
    </div>

    <div class="legend">
      <span><span class="swatch" style="background:#1D9E75"></span>gerçek değerler (FP16, kesintisiz)</span>
      <span><span class="swatch" style="background:#7F77DD"></span>nicelenmiş (basamaklar)</span>
    </div>
  </main>

  <script>
  (function(){
    var cv=document.getElementById('cv'),ctx=cv.getContext('2d');
    var slider=document.getElementById('bits');
    function f(x){return 0.62*Math.sin(x*6.283)+0.30*Math.sin(x*2.6+0.8);}
    function txt(){return getComputedStyle(document.body).getPropertyValue('--muted')||'#888';}
    function grid(){return getComputedStyle(document.body).getPropertyValue('--grid')||'rgba(255,255,255,.16)';}
    function draw(){
      var b=+slider.value, L=Math.pow(2,b);
      var dpr=Math.min(window.devicePixelRatio||1,2);
      var w=cv.clientWidth,h=cv.clientHeight;
      cv.width=w*dpr;cv.height=h*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);
      ctx.clearRect(0,0,w,h);
      var pad=14, top=pad, bot=h-pad, mid=(top+bot)/2, amp=(bot-top)/2*0.92;
      var ymin=-1,ymax=1,stepv=(ymax-ymin)/(L-1);
      function Y(v){return mid-v*amp;}
      function quant(v){var k=Math.round((v-ymin)/stepv);return ymin+k*stepv;}
      ctx.strokeStyle=grid();ctx.lineWidth=1;ctx.setLineDash([4,4]);
      for(var i=0;i<L;i++){var v=ymin+i*stepv,yy=Y(v);ctx.beginPath();ctx.moveTo(pad,yy);ctx.lineTo(w-pad,yy);ctx.stroke();}
      ctx.setLineDash([]);
      var N=240,err=0;
      ctx.strokeStyle='#7F77DD';ctx.lineWidth=2.4;ctx.beginPath();
      for(var j=0;j<=N;j++){var x=j/N,qy=quant(f(x)),px=pad+x*(w-2*pad);if(j===0)ctx.moveTo(px,Y(qy));else ctx.lineTo(px,Y(qy));}
      ctx.stroke();
      ctx.strokeStyle='#1D9E75';ctx.lineWidth=2.4;ctx.beginPath();
      for(var k2=0;k2<=N;k2++){var x2=k2/N,ty=f(x2),px2=pad+x2*(w-2*pad);if(k2===0)ctx.moveTo(px2,Y(ty));else ctx.lineTo(px2,Y(ty));err+=Math.abs(ty-quant(ty));}
      ctx.stroke();
      err=err/(N+1)/2*100;
      document.getElementById('bitsOut').textContent=b;
      document.getElementById('levels').textContent=L;
      document.getElementById('err').textContent='%'+err.toFixed(1);
    }
    slider.addEventListener('input',draw);
    window.addEventListener('resize',draw);
    draw();
  })();
  </script>
</body>
</html>
